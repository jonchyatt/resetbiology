<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sincere — Dichotic Mix Pad</title>
<style>
  :root{ --amber:#ffcf3a; --r:#ff7a5c; --l:#5cc8ff; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;background:#0b0b10;color:#eee;font:15px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px calc(28px + env(safe-area-inset-bottom));}
  h1{font-size:20px;margin:4px 0 2px;color:#ffe49a;}
  .tag{color:#8a8a99;font-size:13px;margin:0 0 18px;}
  .play{display:flex;align-items:center;gap:14px;margin:14px 0 22px;}
  .pbtn{width:64px;height:64px;border-radius:50%;border:0;font-size:26px;color:#0b0b10;background:var(--amber);display:grid;place-items:center;cursor:pointer;}
  .tm{font:13px ui-monospace,monospace;color:#9a9aab;}
  .lane{border:1px solid #2a2a38;border-radius:16px;padding:16px;margin-bottom:14px;background:#13131b;}
  .lane.right{border-left:4px solid var(--r);}
  .lane.left{border-left:4px solid var(--l);}
  .lhdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .lhdr .nm{font-size:16px;font-weight:700;color:#fff;}
  .ear{font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px;}
  .ear.r{background:rgba(255,122,92,.18);color:var(--r);}
  .ear.l{background:rgba(92,200,255,.18);color:var(--l);}
  .vrow{display:flex;align-items:center;gap:12px;}
  .vrow input{flex:1;height:30px;}
  input[type=range].r{accent-color:var(--r);} input[type=range].l{accent-color:var(--l);}
  .pct{font:12px ui-monospace,monospace;width:46px;text-align:right;color:#cfcfe0;}
  .swap{margin-top:6px;width:100%;padding:12px;border-radius:12px;border:1px solid #3a3a4a;background:#1a1a26;color:#cfcfe0;font-size:14px;cursor:pointer;}
  .note{font-size:12px;color:#6a6a7a;margin-top:14px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sincere — Mix Pad</h1>
  <p class="tag">Dichotic practice: your part in one ear, the quartet (without you) in the other. Headphones on.</p>

  <div class="play">
    <button class="pbtn" id="play">▶</button>
    <span class="tm" id="tm">0:00 / 0:00</span>
  </div>

  <div class="lane right" id="laneBari">
    <div class="lhdr"><span class="nm">Your part · Baritone</span><span class="ear r" id="earBari">RIGHT</span></div>
    <div class="vrow"><input type="range" class="r" id="volBari" min="0" max="150" value="100"><span class="pct" id="volBariV">100%</span></div>
  </div>

  <div class="lane left" id="laneQ">
    <div class="lhdr"><span class="nm">Quartet · no baritone</span><span class="ear l" id="earQ">LEFT</span></div>
    <div class="vrow"><input type="range" class="l" id="volQ" min="0" max="150" value="100"><span class="pct" id="volQV">100%</span></div>
  </div>

  <button class="swap" id="swap">⇄ Swap ears</button>
  <p class="note">Hard-wired Sincere preset · baritone-only + quartet-minus-baritone</p>
</div>

<script>
const $=(id)=>document.getElementById(id);
const baA=new Audio('/sincere-baritone/audio.mp3');     // baritone only (your part)
const quA=new Audio('/sincere-baritone/quartet.m4a');   // quartet, no baritone
baA.preload='auto'; quA.preload='auto';
let ctx,gBa,gQu,pBa,pQu,wired=false,baritoneRight=true;

function wire(){
  if(wired)return; wired=true;
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  const sBa=ctx.createMediaElementSource(baA), sQu=ctx.createMediaElementSource(quA);
  gBa=ctx.createGain(); gQu=ctx.createGain();
  pBa=ctx.createStereoPanner(); pQu=ctx.createStereoPanner();
  sBa.connect(gBa).connect(pBa).connect(ctx.destination);
  sQu.connect(gQu).connect(pQu).connect(ctx.destination);
  applyPan(); applyVol();
}
function applyPan(){ if(!pBa)return; pBa.pan.value=baritoneRight?1:-1; pQu.pan.value=baritoneRight?-1:1;
  $('earBari').textContent=baritoneRight?'RIGHT':'LEFT'; $('earBari').className='ear '+(baritoneRight?'r':'l');
  $('earQ').textContent=baritoneRight?'LEFT':'RIGHT'; $('earQ').className='ear '+(baritoneRight?'l':'r'); }
function applyVol(){ if(!gBa)return; gBa.gain.value=(+$('volBari').value)/100; gQu.gain.value=(+$('volQ').value)/100; }

const fmt=(s)=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
function toggle(){
  wire(); if(ctx.state==='suspended')ctx.resume();
  if(baA.paused){ quA.currentTime=baA.currentTime; baA.play(); quA.play(); $('play').textContent='⏸'; }
  else { baA.pause(); quA.pause(); $('play').textContent='▶'; }
}
$('play').addEventListener('click',toggle);
// keep the two tracks locked in time
setInterval(()=>{ if(!baA.paused && Math.abs(baA.currentTime-quA.currentTime)>0.04) quA.currentTime=baA.currentTime; },250);
baA.addEventListener('timeupdate',()=>$('tm').textContent=`${fmt(baA.currentTime)} / ${fmt(baA.duration||0)}`);
baA.addEventListener('ended',()=>{quA.pause();$('play').textContent='▶';});
$('volBari').addEventListener('input',e=>{$('volBariV').textContent=e.target.value+'%';applyVol();});
$('volQ').addEventListener('input',e=>{$('volQV').textContent=e.target.value+'%';applyVol();});
$('swap').addEventListener('click',()=>{baritoneRight=!baritoneRight;applyPan();});
</script>
</body>
</html>
