<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Score Follow — Baritone</title>
<style>
  :root { --amber:#ffcf3a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:#0b0b10; overflow:hidden; font:14px -apple-system,Segoe UI,Roboto,sans-serif; color:#eee; }
  /* full-screen scrolling reader — the PDF IS the screen */
  #viewer { position:fixed; inset:0; overflow:auto; background:#0b0b10; -webkit-overflow-scrolling:touch; }
  #canvas { position:relative; }
  #canvas img { display:block; width:100%; height:auto; user-select:none; -webkit-user-drag:none; }
  #band { position:absolute; pointer-events:none; border-radius:8px; background:linear-gradient(90deg, rgba(255,207,58,.18), rgba(255,207,58,.10)); box-shadow:0 0 0 1.5px rgba(255,207,58,.4) inset; transition:top .15s,left .15s,width .15s,height .15s; }
  #cursor { position:absolute; pointer-events:none; width:4px; border-radius:4px; background:var(--amber); box-shadow:0 0 12px 4px rgba(255,207,58,.85); }
  #trail { position:absolute; pointer-events:none; border-radius:6px; background:linear-gradient(90deg, rgba(255,207,58,0), rgba(255,207,58,.3)); }
  #pitch { position:absolute; pointer-events:none; width:18px; height:18px; margin:-9px 0 0 -9px; border-radius:50%; opacity:0; transition:opacity .12s; box-shadow:0 0 9px 2px currentColor; }
  /* floating minimal dock — auto-hides; tap screen to toggle */
  #dock { position:fixed; left:50%; bottom:14px; transform:translateX(-50%); display:flex; align-items:center; gap:12px;
          background:#15151fdd; backdrop-filter:blur(10px); border:1px solid #2c2c3a; border-radius:999px; padding:8px 12px;
          box-shadow:0 6px 24px rgba(0,0,0,.5); transition:opacity .3s, transform .3s; z-index:5; }
  #dock.hide { opacity:0; transform:translate(-50%,30px); pointer-events:none; }
  .pbtn { width:46px; height:46px; border-radius:50%; border:0; font-size:20px; color:#0b0b10; background:var(--amber); display:grid; place-items:center; cursor:pointer; }
  .ibtn { height:38px; border-radius:19px; border:1px solid #3a3a4a; background:#1b1b26; color:#cfcfe0; font-size:13px; padding:0 13px; cursor:pointer; }
  .ibtn.on { background:#1f3a2a; border-color:#3ad07a; color:#7fe6a8; }
  .ibtn.want { border-color:var(--amber); color:var(--amber); animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(255,207,58,.45);} 50%{ box-shadow:0 0 0 7px rgba(255,207,58,0);} }
  #tm { font:12px ui-monospace,monospace; color:#9a9aab; min-width:78px; text-align:center; }
  /* settings sheet */
  #sheet { position:fixed; inset:0; background:#0b0b10ee; z-index:9; display:none; padding:20px 16px calc(20px + env(safe-area-inset-bottom)); }
  #sheet.show { display:block; }
  #sheet h2 { font-size:15px; color:#ffe49a; margin:6px 0 14px; }
  #sheet a.back { color:#9a9aab; text-decoration:none; font-size:13px; }
  #sheet select { width:100%; background:#1a1a26; color:#ffd86b; border:1px solid #3a3a4a; border-radius:10px; padding:11px; font-size:16px; font-weight:600; margin-bottom:16px; }
  .srow { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .srow .l { font-size:12px; color:#9a9aab; width:78px; }
  .srow input[type=range]{ flex:1; accent-color:var(--amber); }
  .srow .v { font:11px ui-monospace,monospace; color:#ffd86b; width:44px; text-align:right; }
  #sheet .done { width:100%; margin-top:10px; padding:13px; border-radius:12px; border:0; background:var(--amber); color:#0b0b10; font-size:15px; font-weight:700; }
  #tapwrap { position:fixed; left:0; right:0; bottom:0; z-index:12; display:none; background:#15151fee; backdrop-filter:blur(10px); border-top:1px solid #3a3a4a; padding:14px 16px calc(16px + env(safe-area-inset-bottom)); text-align:center; }
  #tapmsg { font-size:13px; color:#cfcfe0; margin-bottom:10px; }
  #tapbtn { width:100%; height:88px; border-radius:18px; border:0; background:var(--amber); color:#0b0b10; font-size:22px; font-weight:800; cursor:pointer; }
  #tapbtn:active { transform:scale(.98); }
</style>
</head>
<body>
<div id="viewer"><div id="canvas">
  <img id="page" alt="score page" />
  <div id="band"></div><div id="trail"></div><div id="cursor"></div><div id="pitch"></div>
</div></div>

<div id="dock">
  <button class="pbtn" id="play">▶</button>
  <span id="tm">0:00 / 0:00</span>
  <button class="ibtn" id="mic">🎤</button>
  <button class="ibtn" id="more">≡</button>
</div>

<div id="sheet">
  <div style="display:flex;justify-content:space-between;align-items:center;"><a href="/practice.html" class="back">‹ Practice</a><span style="color:#7a7a8a;font-size:12px">settings</span></div>
  <h2>Song & tracking</h2>
  <select id="song"></select>
  <div class="srow"><span class="l">Start</span><input type="range" id="offset" min="0" max="25" step="0.1" value="0"><span class="v" id="offsetv">0.0s</span></div>
  <div class="srow"><span class="l">Line speed</span><input type="range" id="speed" min="0.5" max="1.8" step="0.01" value="1"><span class="v" id="speedv">1.00×</span></div>
  <div class="srow"><span class="l">Slow audio</span><input type="range" id="rate" min="0.5" max="1" step="0.05" value="1"><span class="v" id="ratev">1.00×</span></div>
  <div style="border-top:1px solid #2c2c3a;margin:14px 0 10px;"></div>
  <button class="done" id="settap" style="background:#1b1b26;color:#ffd86b;border:1px solid #3a3a4a;">⏱ Tap the beat — lock the timing</button>
  <div id="tapstat" style="font-size:11px;color:#7a7a8a;margin:8px 2px 0;"></div>
  <button class="done" id="cleartap" style="background:none;color:#6a6a7a;border:0;font-size:12px;margin-top:6px;display:none;">clear saved timing</button>
  <button class="done" id="done" style="margin-top:14px;">Back to the score</button>
</div>

<div id="tapwrap">
  <div id="tapmsg">Tap when your line starts a new row.</div>
  <button id="tapbtn">TAP</button>
  <div style="display:flex;gap:10px;margin-top:10px;">
    <button id="tapcancel" class="ibtn" style="flex:1">Cancel</button>
    <button id="tapdone" class="ibtn" style="flex:1">Save timing</button>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
const SONGS=[
  {id:'sincere',label:'Ice Cream / Sincere',dir:'/sincere-baritone'},
  {id:'itsyou',label:"It's You",dir:'/itsyou-baritone'},
  {id:'lida',label:'Lida Rose',dir:'/lida-baritone'},
  {id:'goodnight',label:'Goodnight Ladies',dir:'/goodnight-baritone'},
];
const $=(id)=>document.getElementById(id);
const viewer=$('viewer'),canvas=$('canvas'),page=$('page'),band=$('band'),cursor=$('cursor'),trail=$('trail'),pitchDot=$('pitch'),audio=$('audio');
let DIR=SONGS[0].dir,songId=SONGS[0].id,systems=[],curPageIdx=-1,dur=0,ready=false;
let TAPS={}; try{TAPS=JSON.parse(localStorage.getItem('sf_taps')||'{}');}catch(e){}
let tapMode=false, tapList=[];
const PARAMS=new URLSearchParams(location.search), WANT_MIC=PARAMS.get('mic')==='1', PRESET_SLOW=parseFloat(PARAMS.get('slow')||'1');
const ZOOM=1.75; // zoom the page so the staff is readable; auto-follow pans to the cursor
function sizeCanvas(){ canvas.style.width=Math.round(window.innerWidth*ZOOM)+'px'; }

const sel=$('song');
SONGS.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s.label;sel.appendChild(o);});
const startIdx=Math.max(0,SONGS.findIndex(s=>s.id===PARAMS.get('song')));
sel.value=startIdx; sel.addEventListener('change',()=>loadSong(+sel.value));

function saveNudge(){try{localStorage.setItem('sf_'+songId,JSON.stringify({o:+$('offset').value,s:+$('speed').value}));}catch(e){}}
function loadNudge(){try{const v=JSON.parse(localStorage.getItem('sf_'+songId)||'null');if(v){$('offset').value=v.o;$('speed').value=v.s;}else{$('offset').value=0;$('speed').value=1;}}catch(e){}
  $('offsetv').textContent=(+$('offset').value).toFixed(1)+'s';$('speedv').textContent=(+$('speed').value).toFixed(2)+'×';}

function loadSong(i){
  const s=SONGS[i];DIR=s.dir;songId=s.id;ready=false;systems=[];curPageIdx=-1;dur=0;
  audio.pause();$('play').textContent='▶';audio.currentTime=0;audio.src=`${DIR}/audio.mp3`;
  band.style.width=trail.style.width=cursor.style.height='0px';loadNudge();
  fetch(`${DIR}/path.json`).then(r=>r.json()).then(d=>{(d.pages||[]).forEach((pg,pi)=>(pg.bands||[]).forEach(b=>systems.push({page:pi,x0:b.x0,x1:b.x1,yc:b.yc,bh:b.bh})));ready=systems.length>0;showPage(0);}).catch(()=>{});
}
function showPage(pi){if(pi===curPageIdx)return;curPageIdx=pi;page.src=`${DIR}/page-${String(pi+1).padStart(2,'0')}.jpg`;}

let lastIdx=-1;
function place(t){
  if(!ready||!dur)return;
  let idx, frac;
  if(tapMode){ idx=Math.max(0,Math.min(systems.length-1,tapList.length-1)); frac=0; }
  else { const taps=TAPS[songId];
    if(taps&&taps.length>=2){ let i=0; while(i<taps.length-1 && t>=taps[i+1].t) i++;
      idx=Math.min(systems.length-1,taps[i].sys); const tn=(i+1<taps.length)?taps[i+1].t:dur;
      frac=Math.min(1,Math.max(0,(t-taps[i].t)/Math.max(0.15,tn-taps[i].t))); }
    else { const offset=parseFloat($('offset').value),speed=parseFloat($('speed').value),slice=dur/systems.length,eff=Math.max(0,(t-offset))*speed;
      idx=Math.min(systems.length-1,Math.floor(eff/slice)); frac=Math.min(1,(eff-idx*slice)/slice); } }
  const s=systems[idx]; curBand=s;
  showPage(s.page);
  const W=canvas.clientWidth,H=page.clientHeight||(W*page.naturalHeight/Math.max(1,page.naturalWidth));
  const left=s.x0*W,top=(s.yc-s.bh*0.9)*H,width=(s.x1-s.x0)*W,height=s.bh*1.8*H,nowX=left+frac*width,cy=s.yc*H;
  band.style.left=left+'px';band.style.top=top+'px';band.style.width=width+'px';band.style.height=height+'px';
  cursor.style.left=(nowX-2)+'px';cursor.style.top=top+'px';cursor.style.height=height+'px';
  trail.style.left=left+'px';trail.style.top=top+'px';trail.style.height=height+'px';trail.style.width=Math.max(0,nowX-left)+'px';
  // AUTO-FOLLOW: pan the viewer so the cursor stays ~28% from left, ~38% from top — goes forward by itself
  viewer.scrollTo({ left:Math.max(0,nowX-viewer.clientWidth*0.28), top:Math.max(0,cy-viewer.clientHeight*0.38), behavior: idx!==lastIdx?'smooth':'auto' });
  lastIdx=idx;
}
let curBand=null;

// ---- voice -> staff ----
let ac=null,analyser=null,buf=null,micOn=false,rafId=0;
function midiToStaffOffsetPx(midi,s){const H=page.clientHeight||1,staffPx=s.bh*0.62*H,hs=staffPx/8,names=[0,0,1,1,2,3,3,4,4,5,5,6];const oct=Math.floor(midi/12)-1,li=names[((midi%12)+12)%12];return -(((oct-3)*7+(li-1))*hs);}
function f2m(f){return 69+12*Math.log2(f/440);}
function autoCorrelate(b,sr){let rms=0;for(let i=0;i<b.length;i++)rms+=b[i]*b[i];rms=Math.sqrt(rms/b.length);if(rms<0.012)return -1;let r1=0,r2=b.length-1;for(let i=0;i<b.length/2;i++)if(Math.abs(b[i])<0.2){r1=i;break;}for(let i=1;i<b.length/2;i++)if(Math.abs(b[b.length-i])<0.2){r2=b.length-i;break;}const c=b.slice(r1,r2),n=c.length,co=new Array(n).fill(0);for(let l=0;l<n;l++)for(let i=0;i<n-l;i++)co[l]+=c[i]*c[i+l];let d=0;while(d<n-1&&co[d]>co[d+1])d++;let mx=-1,p=-1;for(let i=d;i<n;i++)if(co[i]>mx){mx=co[i];p=i;}return p<=0?-1:sr/p;}
function micLoop(){rafId=requestAnimationFrame(micLoop);if(!analyser||!curBand){pitchDot.style.opacity=0;return;}analyser.getFloatTimeDomainData(buf);const f=autoCorrelate(buf,ac.sampleRate);if(f>60&&f<500){const H=page.clientHeight||1,s=curBand,x=parseFloat(cursor.style.left)+2,y=s.yc*H+midiToStaffOffsetPx(f2m(f),s);pitchDot.style.left=x+'px';pitchDot.style.top=y+'px';const good=Math.abs(y-s.yc*H)<s.bh*0.55*H;pitchDot.style.color=good?'#39d98a':'#ff9d3a';pitchDot.style.background='currentColor';pitchDot.style.opacity=.95;}else pitchDot.style.opacity=0;}
async function toggleMic(){if(micOn){micOn=false;$('mic').classList.remove('on');pitchDot.style.opacity=0;if(rafId)cancelAnimationFrame(rafId);if(ac){ac.close();ac=null;}return;}try{const st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false}});ac=new(window.AudioContext||window.webkitAudioContext)();const sr=ac.createMediaStreamSource(st);analyser=ac.createAnalyser();analyser.fftSize=2048;buf=new Float32Array(analyser.fftSize);sr.connect(analyser);micOn=true;$('mic').classList.add('on');$('mic').classList.remove('want');micLoop();}catch(e){alert('Mic needs permission (and HTTPS).');}}
$('mic').addEventListener('click',e=>{e.stopPropagation();toggleMic();});

// dock auto-hide + tap-to-toggle
let hideT=0; const dock=$('dock');
function showDock(){dock.classList.remove('hide');clearTimeout(hideT);hideT=setTimeout(()=>{if(!audio.paused)dock.classList.add('hide');},3500);}
viewer.addEventListener('click',()=>{ dock.classList.contains('hide')?showDock():dock.classList.add('hide'); });
$('more').addEventListener('click',e=>{e.stopPropagation();refreshTapStat();$('sheet').classList.add('show');});

// ---- tap-the-beat: lock the light to the real (rubato) timing ----
function refreshTapStat(){ const n=(TAPS[songId]||[]).length; $('tapstat').textContent=n?`✓ Timing locked (${n} rows) — the light follows your taps.`:'No custom timing yet — using an even pace. Tap the beat to make it dead-on.'; $('cleartap').style.display=n?'block':'none'; }
function updTapMsg(){ $('tapmsg').textContent=`Tap each time your line starts a NEW ROW  ·  ${tapList.length} / ${systems.length}`; }
function startTap(){ tapMode=true; tapList=[]; audio.currentTime=0; audio.play(); $('play').textContent='⏸'; $('tapwrap').style.display='block'; dock.classList.add('hide'); updTapMsg(); place(0); }
function saveTap(){ if(tapList.length>=2){ TAPS[songId]=tapList.slice(); try{localStorage.setItem('sf_taps',JSON.stringify(TAPS));}catch(e){} } tapMode=false; $('tapwrap').style.display='none'; audio.pause(); $('play').textContent='▶'; audio.currentTime=0; refreshTapStat(); }
$('settap').addEventListener('click',()=>{ $('sheet').classList.remove('show'); startTap(); });
$('cleartap').addEventListener('click',()=>{ delete TAPS[songId]; try{localStorage.setItem('sf_taps',JSON.stringify(TAPS));}catch(e){} refreshTapStat(); });
$('tapbtn').addEventListener('click',()=>{ if(!tapMode)return; if(tapList.length<systems.length){ tapList.push({sys:tapList.length,t:audio.currentTime}); if(navigator.vibrate)navigator.vibrate(15); } updTapMsg(); place(audio.currentTime); if(tapList.length>=systems.length) saveTap(); });
$('tapdone').addEventListener('click',saveTap);
$('tapcancel').addEventListener('click',()=>{ tapMode=false; $('tapwrap').style.display='none'; audio.pause(); $('play').textContent='▶'; });
$('done').addEventListener('click',()=>$('sheet').classList.remove('show'));

const fmt=(s)=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
audio.addEventListener('loadedmetadata',()=>{dur=audio.duration||0;audio.playbackRate=parseFloat($('rate').value)||1;$('tm').textContent=`0:00 / ${fmt(dur)}`;});
audio.addEventListener('timeupdate',()=>{place(audio.currentTime);$('tm').textContent=`${fmt(audio.currentTime)} / ${fmt(dur)}`;});
audio.addEventListener('ended',()=>{$('play').textContent='▶';showDock();});
$('play').addEventListener('click',e=>{e.stopPropagation();if(WANT_MIC&&!micOn)toggleMic();if(audio.paused){audio.play();$('play').textContent='⏸';showDock();}else{audio.pause();$('play').textContent='▶';dock.classList.remove('hide');}});
$('offset').addEventListener('input',e=>{$('offsetv').textContent=(+e.target.value).toFixed(1)+'s';place(audio.currentTime);saveNudge();});
$('speed').addEventListener('input',e=>{$('speedv').textContent=(+e.target.value).toFixed(2)+'×';place(audio.currentTime);saveNudge();});
$('rate').addEventListener('input',e=>{audio.playbackRate=+e.target.value;$('ratev').textContent=(+e.target.value).toFixed(2)+'×';});
window.addEventListener('resize',()=>{sizeCanvas();place(audio.currentTime);});
page.addEventListener('load',()=>place(audio.currentTime));

sizeCanvas();
if(PRESET_SLOW<1){$('rate').value=PRESET_SLOW;$('ratev').textContent=PRESET_SLOW.toFixed(2)+'×';audio.playbackRate=PRESET_SLOW;}
if(WANT_MIC)$('mic').classList.add('want');
loadSong(startIdx);
</script>
</body>
</html>
